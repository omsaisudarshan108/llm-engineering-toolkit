# fly.toml app configuration file for insurance-slm
# Generated by fly launch, then customised for GPU + volume deployment.
#
# Docs: https://fly.io/docs/reference/configuration/

app = 'insurance-slm'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  BASE_MODEL_ID   = 'microsoft/Phi-3.5-mini-instruct'
  ADAPTER_PATH    = '/app/models/insurance-phi35-lora'
  MODEL_CACHE_DIR = '/models/cache'
  USE_4BIT        = 'true'
  MERGE_ON_LOAD   = 'false'
  PORT            = '8080'

# Secrets (set via `fly secrets set KEY=value`, never stored here):
#   HF_TOKEN — HuggingFace token if the model requires authentication

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = 'stop'
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ['app']

  [http_service.concurrency]
    type       = 'requests'
    soft_limit = 5
    hard_limit = 10

  [[http_service.checks]]
    grace_period = '60s'    # fly.io max; model load continues past this — /health returns 503 until ready
    interval     = '30s'
    method       = 'GET'
    path         = '/health'
    timeout      = '10s'

# GPU machine — A10 (24 GB VRAM); 4-bit Phi-3.5-mini needs ~4 GB
[[vm]]
  gpu_kind = 'a10'
  memory   = '16gb'
  cpus     = 4

# Persistent volume — caches the ~7.6 GB HuggingFace download across deploys.
# Create once: fly volumes create models_vol --size 50 --region ord
[[mounts]]
  source                     = 'models_vol'
  destination                = '/models'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '10gb'
  auto_extend_size_limit     = '100gb'
